<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>The Mohit Files — A scrapbook for Papa</title>
    <meta name="description" content="A handmade tribute scrapbook to Mohit Adhikari: stories, laughter, chaos, food reviews, mountains, and love." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&family=Kalam:wght@300;400;700&family=Permanent+Marker&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Special+Elegant&display=swap"
    />
    <script>
      // Handle GitHub Pages SPA redirect from 404.html
      (function () {
        var redirect = sessionStorage.redirect;
        delete sessionStorage.redirect;
        if (redirect && redirect !== location.href) {
          history.replaceState(null, null, redirect);
        }
        // Also handle the ?/ redirect format
        var search = window.location.search;
        if (search.startsWith('?/')) {
          var decoded = search.slice(2).replace(/~and~/g, '&');
          var parts = decoded.split('&');
          var path = parts[0];
          var query = parts.slice(1).join('&');
          history.replaceState(
            null, null,
            window.location.pathname.split('/').slice(0, 2).join('/') +
            '/' + path + (query ? '?' + query : '') + window.location.hash
          );
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
